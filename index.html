<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Shop Inventory</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.navbar{
    background:#0d6efd;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}

.search-box{
    font-size:20px;
    padding:15px;
    border-radius:15px;
}

.filter-btn{
    margin:5px;
    border-radius:25px;
}

.product-card{

    border:none;

    border-radius:18px;

    box-shadow:
    0 4px 15px rgba(0,0,0,.08);

    transition:.3s;
}

.product-card:hover{

    transform:translateY(-5px);

    box-shadow:
    0 8px 20px rgba(0,0,0,.15);
}

.product-image{

    height:180px;

    background:#ececec;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:60px;

    border-radius:18px 18px 0 0;
}

.product-name{

    font-size:20px;

    font-weight:700;
}

.price{

    font-size:24px;

    color:#198754;

    font-weight:bold;
}

.stock{

    font-size:14px;
}

</style>

</head>

<body>

<nav class="navbar mb-4">

<div class="container-fluid">

<span class="logo">

🛍 Smart Shop

</span>

</div>

</nav>

<div class="container">

<form>

<input

type="text"

name="q"

value="{{query}}"

class="form-control search-box"

placeholder="🔍 Search Products">

</form>

<div class="mt-3 text-center">

<a href="/" class="btn btn-primary filter-btn">
All
</a>

<a href="/?category=Stationery"
class="btn btn-success filter-btn">
📚 Stationery
</a>

<a href="/?category=Gifts"
class="btn btn-warning filter-btn">
🎁 Gifts
</a>

</div>

<div class="row mt-4">

{% for p in products %}

<div class="col-lg-3 col-md-4 col-sm-6 mb-4">

<div class="card product-card">

<div class="product-image">

📦

</div>

<div class="card-body">

<div class="product-name">

{{ p["simple_name"] }}

</div>

<div class="text-muted">

{{ p["brand"] }}

</div>

<div class="mt-2">

<span class="badge bg-info">

{{ p["category"] }}

</span>

</div>

<div class="price mt-3">

₹ {{ p["mrp"] }}

</div>

{% set qty = p["qty"] or 0 %}

{% if qty < 5 %}

<div class="badge bg-danger stock">

⚠ Low Stock

</div>

{% else %}

<div class="badge bg-success stock">

{{ qty }} Available

</div>

{% endif %}

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
